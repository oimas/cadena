server {
    listen       80;
    listen  [::]:80;
    server_name  _;

    root   /usr/share/nginx/html;

    # La home es index.html (redirector → mapa.html).
    # Abrir mdea.intismart.com cae en el redirector y salta al mapa.
    index  index.html;

    # Los archivos son grandes (HTML ~28 MB, indices_data.js ~10 MB).
    # gzip baja la transferencia a una fracción y acelera la 1ª carga.
    gzip              on;
    gzip_comp_level   5;
    gzip_min_length   1024;
    gzip_types        text/html text/css application/javascript application/json image/svg+xml;
    gzip_vary         on;

    # URL limpia: mdea.intismart.com/mapa sirve mapa.html sin mostrar
    # la extensión ni redireccionar (el navegador conserva /mapa en la barra).
    location = /mapa {
        try_files /mapa.html =404;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
